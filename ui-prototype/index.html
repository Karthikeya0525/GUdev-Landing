<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt2PRD | Instant Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">UI&UX DESIGN</span>
                <h1>Prompt2PRD</h1>
            </div>
            <p class="tagline">Turn Ideas Into Investor-Ready PRDs</p>
        </header>

        <!-- Chat Area -->
        <main class="chat-container" id="chatContainer">
            <div class="message-list" id="messageList">
                <div class="message ai-message">
                    <div class="bubble">
                        Hello! I'm ready to help. Describe your startup idea below, and I'll generate a professional PRD instantly.
                    </div>
                </div>
            </div>
        </main>

        <!-- Input Area inside a Form to handle Enter/Submit properly -->
        <footer class="input-area">
            <form id="chatForm" class="input-wrapper">
                <input type="text" id="userInput" placeholder="Describe your startup idea..." autocomplete="off">
                <button type="submit" id="sendBtn" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
